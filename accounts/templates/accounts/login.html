{% extends "base.html" %}
{% block title %}Login — ChatApp{% endblock %}

{% block content %}
<div class="min-h-full flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <span class="text-5xl">💬</span>
            <h1 class="text-2xl font-bold text-white mt-3">Welcome back</h1>
            <p class="text-gray-400 mt-1">Login to continue chatting</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input
                        type="text"
                        name="username"
                        autofocus
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-green-500 transition-colors"
                        placeholder="your username"
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-green-500 transition-colors"
                        placeholder="••••••••"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-semibold py-3 rounded-xl transition-colors mt-2"
                >
                    Login →
                </button>
            </form>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-green-400 hover:text-green-300 font-medium transition-colors">Register here</a>
        </p>

    </div>
</div>
{% endblock %}
